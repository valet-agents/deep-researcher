name: deep-researcher
display_name: Deep Researcher
description: "Every day at 8am, researches top AI sources, summarizes the 5 most important stories from the previous day, and posts a briefing to #ai-news in Slack."
category: research

connectors:
  - catalog: parallel-search-mcp
    description: "Parallel search for querying AI news sources and fetching article content"
    slot_descriptions:
      PARALLEL_API_KEY: "Parallel API key from parallel.ai"

channels:
  - catalog: slack
    description: "Slack workspace connection for posting the daily AI briefing to #ai-news"
  - type: cron
    cron: "0 8 * * *"
    description: "Triggers the daily AI news research and briefing at 8am"
